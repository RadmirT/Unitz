name: Publish NuGet

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            7.0.x
            10.0.x

      - name: Resolve package version from tag
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Validate release tag format
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9]+(\.[A-Za-z0-9]+)*)?$ ]]; then
            echo "Invalid release tag: ${GITHUB_REF_NAME}"
            echo "Expected format:"
            echo "  v1.2.3"
            echo "  v1.2.3-beta.1"
            exit 1
          fi

      - name: Check that tag belongs to default branch
        shell: bash
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          echo "Default branch is: ${DEFAULT_BRANCH}"

          git fetch origin "${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"

          TAG_COMMIT=$(git rev-list -n 1 "${GITHUB_REF_NAME}")

          if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/${DEFAULT_BRANCH}"; then
            echo "Tag ${GITHUB_REF_NAME} is not on ${DEFAULT_BRANCH}"
            exit 1
          fi

          echo "Tag ${GITHUB_REF_NAME} is on ${DEFAULT_BRANCH}"

      - name: Authenticate GitHub Packages for restore
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          if [ -z "$GH_PACKAGES_TOKEN" ]; then
            echo "::error::ACCESS_TOKEN secret is empty or unavailable"
            exit 1
          fi

          dotnet nuget update source github-radmirt \
            --username "radmirt" \
            --password "$GH_PACKAGES_TOKEN" \
            --store-password-in-clear-text \
            --configfile src/nuget.config

      - name: Restore
        run: dotnet restore src/Unitz.sln --configfile src/nuget.config

      - name: Build
        run: dotnet build src/Unitz.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/Unitz.Core.UnitTests/Unitz.Core.UnitTests.csproj --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/Unitz/Unitz.csproj --configuration Release --no-build --output ./artifacts /p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: unitz-nuget-${{ env.PACKAGE_VERSION }}
          path: ./artifacts/*.nupkg
          if-no-files-found: error

      - name: Publish to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to GitHub Packages
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate