name: Publish GitHub Packages

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-dev-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            7.0.x

      - name: Resolve dev package version
        shell: bash
        run: |
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            BASE_VERSION="0.1.0"
          else
            VERSION="${LATEST_TAG#v}"
            BASE_VERSION="${VERSION%%-*}"
          fi

          PACKAGE_VERSION="${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}"

          echo "Latest release tag: $LATEST_TAG"
          echo "Base version: $BASE_VERSION"
          echo "Package version: $PACKAGE_VERSION"

          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Add GitHub Packages source
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      - name: Restore
        run: dotnet restore src/Unitz.sln

      - name: Build
        run: dotnet build src/Unitz.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/Unitz.Core.UnitTests/Unitz.Core.UnitTests.csproj --configuration Release --no-build

      - name: Pack
        run: |
          dotnet pack src/Unitz/Unitz.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            /p:PackageVersion="$PACKAGE_VERSION"

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: unitz-github-packages
          path: ./artifacts/*.nupkg
          if-no-files-found: error

      - name: Publish to GitHub Packages
        run: dotnet nuget push "./artifacts/*.nupkg" --source github --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate